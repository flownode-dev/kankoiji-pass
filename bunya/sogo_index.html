<style>
  :root {
    --bg:        #0f1117;
    --surface:   #1a1d27;
    --surface2:  #222636;
    --border:    #2e3348;
    --accent:    #4f8ef7;
    --accent2:   #7c5cfc;
    --correct:   #22c55e;
    --wrong:     #ef4444;
    --bookmark:  #f59e0b;
    --text:      #e8eaf0;
    --muted:     #7a8099;
    --mono:      'DM Mono', monospace;
    --sans:      'Noto Sans JP', sans-serif;
    --radius:    12px;
    --transition: 0.2s cubic-bezier(.4,0,.2,1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; line-height: 1.7; }

  /* Header */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-weight: 900; font-size: 1.1rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: .02em; }
  .header-nav { display: flex; gap: 8px; align-items: center; }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 8px; font-size: .8rem; cursor: pointer; transition: var(--transition); font-family: var(--sans); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* Progress Bar */
  .progress-bar-wrap { position: sticky; top: 56px; z-index: 99; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 24px 8px; }
  .progress-info { display: flex; justify-content: space-between; font-size: .8rem; color: var(--muted); margin-bottom: 6px; }
  .score-live { font-weight: 700; color: var(--accent); }
  .progress-track { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width .4s ease; }

  /* Hero */
  .sogo-hero { background: linear-gradient(135deg, rgba(79,142,247,.08), rgba(124,92,252,.08)); border-bottom: 1px solid var(--border); padding: 28px 24px 24px; text-align: center; }
  .sogo-hero h1 { font-size: clamp(1.2rem,3vw,1.6rem); font-weight: 900; margin-bottom: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sogo-hero p { font-size: .85rem; color: var(--muted); margin-bottom: 20px; }
  .sogo-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 20px; }
  .sogo-tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; font-size: .72rem; padding: 3px 10px; color: var(--muted); }
  .btn-start { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; padding: 12px 32px; border-radius: 10px; font-size: .95rem; font-weight: 700; cursor: pointer; font-family: var(--sans); transition: var(--transition); }

  /* Filter Bar */
  .filter-bar { display: flex; align-items: center; gap: 8px; padding: 10px 24px; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; white-space: nowrap; }

  .filter-chip.active, .filter-chip:hover { background: rgba(79,142,247,.15); border-color: var(--accent); color: var(--accent); }
  .spacer { flex: 1; }
  .btn-reset { background: none; border: 1px solid var(--border); color: var(--muted); padding: 5px 14px; border-radius: 8px; font-size: .78rem; cursor: pointer; font-family: var(--sans); }
  .btn-reset:hover { border-color: var(--wrong); color: var(--wrong); }

  /* Quiz Container */
  .quiz-container { max-width: 800px; margin: 0 auto; padding: 20px 16px 100px; display: flex; flex-direction: column; gap: 16px; }

  /* Loading State */
  .loading-state { text-align: center; padding: 80px 20px; color: var(--muted); }
  .loading-spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Quiz Card */
  .quiz-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color var(--transition); }
  .quiz-card.answered-correct { border-color: rgba(34,197,94,.35); }

  .card-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); flex-wrap: wrap; }

  .btn-bookmark:hover, .btn-bookmark.bookmarked { opacity: 1; }
  .card-body { padding: 16px; }
  .question-text { font-size: .95rem; font-weight: 700; margin-bottom: 14px; line-height: 1.65; }
  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choice { display: flex; align-items: flex-start; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; cursor: pointer; text-align: left; font-size: .88rem; font-family: var(--sans); color: var(--text); transition: var(--transition); line-height: 1.55; width: 100%; }
  .choice:hover:not(:disabled) { border-color: var(--accent); background: rgba(79,142,247,.08); }
  .choice:disabled { cursor: default; }
  .choice.correct  { border-color: var(--correct); background: rgba(34,197,94,.12); color: #a3f0b8; }
  .choice.wrong    { border-color: var(--wrong);   background: rgba(239,68,68,.12);  color: #fca5a5; }
  .choice-label { font-family: var(--mono); font-size: .82rem; color: var(--muted); flex-shrink: 0; min-width: 20px; }
  .explanation { background: rgba(79,142,247,.06); border: 1px solid rgba(79,142,247,.2); border-radius: 8px; padding: 14px 16px; margin-top: 14px; font-size: .88rem; display: none; }
  .explanation.show { display: block; }
  .explanation-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: 700; color: var(--accent); font-size: .82rem; }
  .btn-toggle-exp { background: none; border: 1px solid rgba(79,142,247,.3); color: var(--accent); padding: 3px 10px; border-radius: 6px; font-size: .72rem; cursor: pointer; font-family: var(--sans); }
  .correct-answer-note { font-weight: 700; color: var(--correct); margin-bottom: 8px; font-size: .85rem; }
  .explanation-body p { color: #c8d0e8; line-height: 1.75; }

  /* Score Summary */
  .score-summary { background: linear-gradient(135deg, rgba(79,142,247,.1), rgba(124,92,252,.1)); border: 1px solid rgba(79,142,247,.3); border-radius: var(--radius); padding: 32px 24px; text-align: center; display: none; }
  .score-summary.show { display: block; }
  .score-title { font-size: .85rem; color: var(--muted); margin-bottom: 8px; }
  .score-num { font-size: 3.5rem; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin-bottom: 6px; }
  .score-detail { font-size: .9rem; color: var(--muted); margin-bottom: 20px; }
  .score-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; padding: 10px 22px; border-radius: 8px; font-size: .88rem; font-weight: 700; cursor: pointer; font-family: var(--sans); }
  .btn-outline  { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 22px; border-radius: 8px; font-size: .88rem; font-weight: 700; cursor: pointer; font-family: var(--sans); }

  /* FAB */
  .fab { position: fixed; bottom: 24px; right: 20px; width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: #fff; border: none; font-size: 1.1rem; cursor: pointer; display: none; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(79,142,247,.4); z-index: 200; }
  .fab.show { display: flex; }

  @media(max-width:600px) {
    .quiz-container { padding: 16px 12px 80px; }
    .card-body { padding: 14px 12px; }
    .sogo-hero { padding: 20px 16px 18px; }
  }
</style>

<script>
/* =============================================
   全分野JSONのパス
   ============================================= */
const DATA_FILES = [
  { path: '/data/kucho.json',    label: '空調設備' },
  { path: '/data/kyuhaisu.json', label: '給排水衛生設備' },
  { path: '/data/shobo.json',    label: '消防設備' },
  { path: '/data/kotei.json',    label: '工程管理' },
  { path: '/data/anzen.json',    label: '品質・安全管理' },
  { path: '/data/hoki.json',     label: '法規' },
  { path: '/data/kiso.json',     label: '一般基礎' },
  { path: '/data/questions.json', label: '過去問' },
];

const TOTAL_QUESTIONS = 10;

let allPoolByFile = [];   // 各ファイルの問題プール
let QUESTIONS_DATA = [];  // 今回出題する10問

let state = {
  questions: [],
  answers: {},
  bookmarks: new Set(JSON.parse(localStorage.getItem('kk_bookmarks') || '[]')),
  filterCategory: 'all',
  showBookmarkOnly: false
};

/* =============================================
   起動時：全ファイルをfetch
   ============================================= */
async function loadAllData() {
  const results = await Promise.allSettled(
    DATA_FILES.map(f =>
      fetch(f.path)
        .then(r => r.ok ? r.json() : [])
        .catch(() => [])
    )
  );

  allPoolByFile = results.map((r, i) => ({
    label: DATA_FILES[i].label,
    questions: r.status === 'fulfilled' ? r.value : []
  })).filter(f => f.questions.length > 0);

  const totalAvail = allPoolByFile.reduce((s, f) => s + f.questions.length, 0);

  const btn = document.getElementById('btnStart');
  const msg = document.getElementById('loadingMsg');

  if (totalAvail === 0) {
    msg.textContent = '問題データを読み込めませんでした。';
    return;
  }

  btn.textContent = `▶ 10問スタート（全${totalAvail}問から抽選）`;
  btn.disabled = false;
  msg.textContent = `${allPoolByFile.length}分野・計${totalAvail}問から10問をランダム出題します`;
}

/* =============================================
   ランダム10問を選出（各分野から均等に）
   ============================================= */
function pickQuestions() {
  const files = [...allPoolByFile].filter(f => f.questions.length > 0);
  if (files.length === 0) return [];

  // 各ファイルから何問取るか均等割り当て
  const perFile = Math.floor(TOTAL_QUESTIONS / files.length);
  let remainder = TOTAL_QUESTIONS - perFile * files.length;

  const selected = [];
  for (const f of files) {
    const shuffled = [...f.questions].sort(() => Math.random() - 0.5);
    const take = perFile + (remainder > 0 ? 1 : 0);
    if (remainder > 0) remainder--;
    selected.push(...shuffled.slice(0, Math.min(take, shuffled.length)));
  }

  // 足りない場合は余りの問題から補充
  if (selected.length < TOTAL_QUESTIONS) {
    const allQ = files.flatMap(f => f.questions);
    const notSelected = allQ.filter(q => !selected.find(s => s.id === q.id));
    const extra = notSelected.sort(() => Math.random() - 0.5)
      .slice(0, TOTAL_QUESTIONS - selected.length);
    selected.push(...extra);
  }

  // 最終シャッフル
  return selected.sort(() => Math.random() - 0.5).slice(0, TOTAL_QUESTIONS);
}

/* =============================================
   ゲーム開始
   ============================================= */
function startQuiz(questions) {
  QUESTIONS_DATA  = questions;
  state.questions = [...QUESTIONS_DATA];
  state.answers   = {};
  state.filterCategory   = 'all';
  state.showBookmarkOnly = false;

  // ヒーローを隠してフィルターバーを表示
  document.getElementById('sogoHero').style.display = 'none';
  document.getElementById('filterBar').style.display = 'flex';

  // フィルターチップの「すべて」テキスト更新
  document.querySelector('[data-filter="all"]').textContent = `すべて（${TOTAL_QUESTIONS}問）`;

  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* =============================================
   Render
   ============================================= */
function getFilteredQuestions() {
  return state.questions.filter(q => {
    const catOk = state.filterCategory === 'all' || q.category === state.filterCategory;
    const bmOk  = !state.showBookmarkOnly || state.bookmarks.has(q.id);
    return catOk && bmOk;
  });
}

function renderAll() {
  const container = document.getElementById('quizContainer');
  const summary   = document.getElementById('scoreSummary');
  const fqs = getFilteredQuestions();

  [...container.children].forEach(el => {
    if (el.id !== 'scoreSummary' && el.id !== 'loadingState') el.remove();
  });

  if (fqs.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;padding:60px;color:var(--muted);font-size:.9rem;';
    empty.textContent = '該当する問題がありません。';
    container.insertBefore(empty, summary);
    updateProgress(fqs);
    return;
  }

  fqs.forEach(q => {
    const card = buildCard(q);
    container.insertBefore(card, summary);
  });

  updateProgress(fqs);
  checkAllAnswered(fqs);
}

function buildCard(q) {
  const answered  = state.answers.hasOwnProperty(q.id);
  const userAns   = state.answers[q.id];
  const isCorrect = answered && (userAns === q.answer);
  const isBm      = state.bookmarks.has(q.id);

  const card = document.createElement('div');
  card.className = 'quiz-card' + (answered ? (isCorrect ? ' answered-correct' : ' answered-wrong') : '');
  card.dataset.id = q.id;

  // Q番号：連番表示
  const qNum = (state.questions.indexOf(q) + 1).toString().padStart(2, '0');

  card.innerHTML = `
    <div class="card-header">
      <span class="q-num">Q${qNum}</span>
      <div class="q-tags">
        <span class="tag">${q.category}</span>
        ${q.year ? `<span class="tag" style="background:rgba(124,92,252,.12);color:var(--accent2);border-color:rgba(124,92,252,.25);">${q.year}年</span>` : ''}
      </div>
      ${answered ? `<span class="result-badge show ${isCorrect ? 'correct-badge' : 'wrong-badge'}">${isCorrect ? '✓ 正解' : '✗ 不正解'}</span>` : ''}
      <button class="btn-bookmark ${isBm ? 'bookmarked' : ''}" data-id="${q.id}" title="ブックマーク">⭐</button>
    </div>
    <div class="card-body">
      <p class="question-text">${q.question}</p>
      <div class="choices">
        ${q.choices.map((c, i) => {
          let cls = '';
          if (answered) {
            if (i === q.answer)                   cls = 'correct';
            else if (i === userAns && !isCorrect) cls = 'wrong';
          }
          return `<button class="choice ${cls}" data-qid="${q.id}" data-idx="${i}" ${answered ? 'disabled' : ''}>
            <span class="choice-label">${['①','②','③','④'][i]}</span>
            <span>${c}</span>
          </button>`;
        }).join('')}
      </div>
      <div class="explanation ${answered ? 'show' : ''}">
        <div class="explanation-header">
          <span>📖 解説</span>
          <button class="btn-toggle-exp" data-target="exp-${q.id}">▲ 閉じる</button>
        </div>
        <div class="explanation-body" id="exp-${q.id}">
          <p class="correct-answer-note">正解：${['①','②','③','④'][q.answer]}　${q.choices[q.answer]}</p>
          <p>${q.explanation}</p>
        </div>
      </div>
    </div>
  `;
  return card;
}

/* =============================================
   Progress
   ============================================= */
function updateProgress(fqs) {
  const total    = fqs.length;
  const answered = fqs.filter(q => state.answers.hasOwnProperty(q.id)).length;
  const correct  = fqs.filter(q => state.answers[q.id] === q.answer).length;
  const pct      = total ? Math.round(answered / total * 100) : 0;
  const rate     = answered ? Math.round(correct / answered * 100) : null;

  document.getElementById('progressText').textContent = `${answered} / ${total} 問解答済み`;
  document.getElementById('scoreLive').textContent    = rate !== null ? `正答率 ${rate}%` : '正答率 — %';
  document.getElementById('progressFill').style.width = pct + '%';
}

function checkAllAnswered(fqs) {
  const allDone = fqs.length > 0 && fqs.every(q => state.answers.hasOwnProperty(q.id));
  const summary = document.getElementById('scoreSummary');
  if (allDone) {
    const correct = fqs.filter(q => state.answers[q.id] === q.answer).length;
    const rate = Math.round(correct / fqs.length * 100);
    document.getElementById('finalScore').textContent  = rate + '%';
    document.getElementById('finalDetail').textContent = `${fqs.length}問中 ${correct}問正解`;
    summary.classList.add('show');
  } else {
    summary.classList.remove('show');
  }
}

/* =============================================
   Event Delegation
   ============================================= */
document.getElementById('quizContainer').addEventListener('click', e => {
  const choiceBtn = e.target.closest('.choice');
  if (choiceBtn && !choiceBtn.disabled) {
    const qid = choiceBtn.dataset.qid;
    const idx  = parseInt(choiceBtn.dataset.idx);
    state.answers[qid] = idx;

    const card = document.querySelector(`.quiz-card[data-id="${qid}"]`);
    const q    = state.questions.find(q => q.id === qid);
    if (card && q) {
      const newCard = buildCard(q);
      card.replaceWith(newCard);
    }
    updateProgress(getFilteredQuestions());
    checkAllAnswered(getFilteredQuestions());

    setTimeout(() => {
      document.getElementById(`exp-${qid}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
    return;
  }

  const bmBtn = e.target.closest('.btn-bookmark');
  if (bmBtn) {
    const id = bmBtn.dataset.id;
    if (state.bookmarks.has(id)) { state.bookmarks.delete(id); bmBtn.classList.remove('bookmarked'); }
    else                          { state.bookmarks.add(id);    bmBtn.classList.add('bookmarked'); }
    localStorage.setItem('kk_bookmarks', JSON.stringify([...state.bookmarks]));
    return;
  }

  const toggleBtn = e.target.closest('.btn-toggle-exp');
  if (toggleBtn) {
    const body = document.getElementById(toggleBtn.dataset.target);
    if (body) {
      const hidden = body.style.display === 'none';
      body.style.display = hidden ? '' : 'none';
      toggleBtn.textContent = hidden ? '▲ 閉じる' : '▼ 開く';
    }
  }
});

/* スタートボタン */
document.getElementById('btnStart').addEventListener('click', () => {
  const questions = pickQuestions();
  if (questions.length > 0) startQuiz(questions);
});

/* フィルター */
document.getElementById('filterBar').addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  const filter = chip.dataset.filter;
  if (filter === 'bookmark') {
    state.showBookmarkOnly = !state.showBookmarkOnly;
    chip.classList.toggle('active', state.showBookmarkOnly);
  } else {
    state.filterCategory   = filter;
    state.showBookmarkOnly = false;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === filter));
    document.querySelector('.bookmark-filter').classList.remove('active');
  }
  renderAll();
});

/* ブックマーク表示（ヘッダー） */
document.getElementById('btnShowBookmarks').addEventListener('click', () => {
  state.showBookmarkOnly = !state.showBookmarkOnly;
  document.querySelector('.bookmark-filter').classList.toggle('active', state.showBookmarkOnly);
  renderAll();
});

/* リセット */
document.getElementById('btnResetAll').addEventListener('click', () => {
  if (!confirm('解答をリセットしますか？')) return;
  state.answers = {};
  renderAll();
});

/* 不正解のみ再挑戦 */
document.getElementById('btnRetryWrong').addEventListener('click', () => {
  const wrongIds = new Set(
    getFilteredQuestions()
      .filter(q => state.answers.hasOwnProperty(q.id) && state.answers[q.id] !== q.answer)
      .map(q => q.id)
  );
  state.answers   = {};
  state.questions = QUESTIONS_DATA.filter(q => wrongIds.has(q.id));
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

/* 別の10問で再挑戦 */
document.getElementById('btnRetryAll').addEventListener('click', () => {
  const questions = pickQuestions();
  if (questions.length > 0) startQuiz(questions);
});

/* FAB */
const fab = document.getElementById('fabTop');
window.addEventListener('scroll', () => fab.classList.toggle('show', window.scrollY > 300));
fab.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

/* =============================================
   Init
   ============================================= */
loadAllData();
</script>
</body>
