<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合格ロードマップ | 管工事PASS</title>
<meta name="description" content="1級管工事施工管理技士 一次検定の合格ロードマップ。試験日を入力するだけで、逆算した週別学習計画を自動生成します。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@700;900&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0e17;
  --surface: #131724;
  --surface2: #1c2236;
  --border: #252d45;
  --accent: #4f8ef7;
  --accent2: #7c5cfc;
  --gold: #f0b429;
  --correct: #22c55e;
  --warn: #f59e0b;
  --danger: #ef4444;
  --text: #e8eaf0;
  --muted: #6b7494;
  --mono: 'DM Mono', monospace;
  --sans: 'Noto Sans JP', sans-serif;
  --serif: 'Noto Serif JP', serif;
  --radius: 14px;
  --glow: 0 0 40px rgba(79,142,247,.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  line-height: 1.75;
  overflow-x: hidden;
}

/* ── Header ── */
header {
  background: rgba(11,14,23,.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-weight: 900;
  font-size: 1.1rem;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-decoration: none;
}
.btn-ghost {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 6px 14px;
  border-radius: 8px;
  font-size: .8rem;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  transition: .2s;
  font-family: var(--sans);
}
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

/* ── Hero ── */
.hero {
  position: relative;
  padding: 72px 24px 56px;
  text-align: center;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(79,142,247,.12) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 80% 80%, rgba(124,92,252,.08) 0%, transparent 60%);
  pointer-events: none;
}
/* Grid lines */
.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(79,142,247,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,142,247,.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black, transparent);
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(240,180,41,.1);
  border: 1px solid rgba(240,180,41,.3);
  color: var(--gold);
  font-size: .72rem;
  padding: 4px 14px;
  border-radius: 99px;
  margin-bottom: 20px;
  letter-spacing: .1em;
  font-weight: 700;
  font-family: var(--mono);
}
.hero h1 {
  font-family: var(--serif);
  font-size: clamp(2rem, 5vw, 3rem);
  line-height: 1.2;
  margin-bottom: 14px;
  position: relative;
}
.hero h1 span {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.hero p {
  color: var(--muted);
  font-size: .95rem;
  max-width: 500px;
  margin: 0 auto 36px;
}

/* ── Date Input Card ── */
.input-card {
  max-width: 520px;
  margin: 0 auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 28px 24px;
  position: relative;
  box-shadow: var(--glow);
}
.input-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: var(--radius) var(--radius) 0 0;
}
.input-label {
  font-size: .78rem;
  color: var(--muted);
  letter-spacing: .08em;
  font-weight: 700;
  margin-bottom: 10px;
  display: block;
}
.input-row {
  display: flex;
  gap: 10px;
  align-items: stretch;
}
.date-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--mono);
  font-size: .95rem;
  padding: 11px 14px;
  outline: none;
  transition: .2s;
  appearance: none;
  -webkit-appearance: none;
}
.date-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,247,.12); }
.btn-generate {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  color: #fff;
  padding: 11px 22px;
  border-radius: 8px;
  font-size: .9rem;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  font-family: var(--sans);
  transition: .2s;
}
.btn-generate:hover { opacity: .85; transform: translateY(-1px); }
.btn-generate:active { transform: translateY(0); }

.quick-dates {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 14px;
}
.quick-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 4px 12px;
  border-radius: 99px;
  font-size: .75rem;
  cursor: pointer;
  font-family: var(--sans);
  transition: .2s;
}
.quick-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Status Bar ── */
#statusBar {
  max-width: 880px;
  margin: 32px auto 0;
  padding: 0 24px;
  display: none;
}
.status-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.status-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
  text-align: center;
}
.status-num {
  font-family: var(--mono);
  font-size: 1.8rem;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4px;
}
.status-num.accent { color: var(--accent); }
.status-num.gold { color: var(--gold); }
.status-num.correct { color: var(--correct); }
.status-label { font-size: .72rem; color: var(--muted); letter-spacing: .06em; }

/* ── Phase Overview ── */
#phaseOverview {
  max-width: 880px;
  margin: 24px auto 0;
  padding: 0 24px;
  display: none;
}
.phase-strip {
  display: flex;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.phase-block {
  flex: 1;
  padding: 14px 10px;
  text-align: center;
  font-size: .75rem;
  font-weight: 700;
  letter-spacing: .04em;
  border-right: 1px solid var(--border);
  position: relative;
}
.phase-block:last-child { border-right: none; }
.phase-block.p1 { background: rgba(79,142,247,.1); color: var(--accent); }
.phase-block.p2 { background: rgba(34,197,94,.1); color: var(--correct); }
.phase-block.p3 { background: rgba(245,158,11,.1); color: var(--warn); }
.phase-block.p4 { background: rgba(239,68,68,.1); color: var(--danger); }
.phase-block-weeks { font-size: .68rem; color: var(--muted); font-weight: 400; margin-top: 2px; }

/* ── Roadmap ── */
#roadmapSection {
  max-width: 880px;
  margin: 32px auto 80px;
  padding: 0 24px;
  display: none;
}
.roadmap-title {
  font-family: var(--serif);
  font-size: 1.1rem;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.roadmap-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Week Card */
.week-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
  transition: .2s;
}
.week-card:hover { border-color: rgba(79,142,247,.3); }
.week-card.phase-1 { border-left: 3px solid var(--accent); }
.week-card.phase-2 { border-left: 3px solid var(--correct); }
.week-card.phase-3 { border-left: 3px solid var(--warn); }
.week-card.phase-4 { border-left: 3px solid var(--danger); }
.week-card.current-week {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent), var(--glow);
}
.week-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
}
.week-num {
  font-family: var(--mono);
  font-size: .7rem;
  color: var(--muted);
  letter-spacing: .1em;
  flex-shrink: 0;
  width: 56px;
}
.week-title { font-weight: 700; font-size: .95rem; flex: 1; }
.week-date { font-family: var(--mono); font-size: .72rem; color: var(--muted); flex-shrink: 0; }
.week-tag {
  font-size: .65rem;
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 700;
  flex-shrink: 0;
}
.tag-1 { background: rgba(79,142,247,.15); color: var(--accent); }
.tag-2 { background: rgba(34,197,94,.15); color: var(--correct); }
.tag-3 { background: rgba(245,158,11,.15); color: var(--warn); }
.tag-4 { background: rgba(239,68,68,.15); color: var(--danger); }
.tag-today { background: rgba(240,180,41,.15); color: var(--gold); }
.chevron { color: var(--muted); font-size: .8rem; transition: transform .2s; flex-shrink: 0; }
.week-card.open .chevron { transform: rotate(180deg); }
.week-body {
  display: none;
  padding: 0 18px 18px;
  border-top: 1px solid var(--border);
}
.week-card.open .week-body { display: block; }
.week-desc { font-size: .88rem; color: #b0b8d0; margin: 14px 0 12px; line-height: 1.8; }
.task-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.task-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: .85rem;
  color: #b0b8d0;
  line-height: 1.6;
}
.task-item::before {
  content: '▸';
  color: var(--accent);
  flex-shrink: 0;
  margin-top: 1px;
}
.task-item.done::before { content: '✓'; color: var(--correct); }
.bunya-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 12px;
}
.bunya-chip {
  font-size: .72rem;
  padding: 3px 10px;
  border-radius: 99px;
  border: 1px solid var(--border);
  color: var(--muted);
  text-decoration: none;
  transition: .2s;
  background: var(--surface2);
}
.bunya-chip:hover { border-color: var(--accent); color: var(--accent); }
.study-hours {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: .75rem;
  color: var(--muted);
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.study-hours-bar {
  flex: 1;
  height: 4px;
  background: var(--bg);
  border-radius: 99px;
  overflow: hidden;
}
.study-hours-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}

/* ── Empty State ── */
.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--muted);
}
.empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: .4; }

/* ── CTA at bottom ── */
.bottom-cta {
  background: linear-gradient(135deg, rgba(79,142,247,.1), rgba(124,92,252,.1));
  border: 1px solid rgba(79,142,247,.2);
  border-radius: var(--radius);
  padding: 28px 24px;
  text-align: center;
  margin-top: 32px;
}
.bottom-cta h3 { font-family: var(--serif); font-size: 1.1rem; margin-bottom: 8px; }
.bottom-cta p { color: var(--muted); font-size: .85rem; margin-bottom: 18px; }
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  color: #fff;
  padding: 11px 28px;
  border-radius: 8px;
  font-size: .9rem;
  font-weight: 700;
  text-decoration: none;
  display: inline-block;
}

footer {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 24px;
  text-align: center;
  font-size: .78rem;
  color: var(--muted);
}

@media (max-width: 600px) {
  .hero { padding: 48px 16px 40px; }
  .input-card { padding: 20px 16px; }
  .input-row { flex-direction: column; }
  .status-grid { grid-template-columns: 1fr 1fr; }
  .phase-strip { flex-direction: column; }
  .phase-block { border-right: none; border-bottom: 1px solid var(--border); }
  .week-date { display: none; }
  #roadmapSection { padding: 0 12px; }
}
</style>

<script>
// ── データ定義 ──
const BUNYA = [
  { name: '空調設備', url: '/bunya/kucho/index.html', key: 'kucho' },
  { name: '給排水衛生設備', url: '/bunya/kyuhaisu/index.html', key: 'kyuhaisu' },
  { name: '消防設備', url: '/bunya/shobo/index.html', key: 'shobo' },
  { name: '工程管理', url: '/bunya/kotei/index.html', key: 'kotei' },
  { name: '品質・安全管理', url: '/bunya/anzen/index.html', key: 'anzen' },
  { name: '法規', url: '/bunya/hoki/index.html', key: 'hoki' },
  { name: '一般基礎', url: '/bunya/kiso/index.html', key: 'kiso' },
];

// フェーズ定義（週数の比率）
const PHASES = [
  { id: 1, name: '全体把握', color: 'p1', tag: 'tag-1', ratio: 0.20,
    desc: '8分野の概要を把握。解説ページをひととおり読み、出題傾向をつかむ。' },
  { id: 2, name: '重点分野集中', color: 'p2', tag: 'tag-2', ratio: 0.35,
    desc: '空調・給排水・法規を中心に演習問題を繰り返す。間違いは解説で必ず確認。' },
  { id: 3, name: '全分野仕上げ', color: 'p3', tag: 'tag-3', ratio: 0.30,
    desc: '全分野の演習を回す。週1回は全問通し。苦手問題に絞って集中復習。' },
  { id: 4, name: '直前対策', color: 'p4', tag: 'tag-4', ratio: 0.15,
    desc: 'ひっかけポイント・数値基準・法規の重要条文を集中確認。新規学習より復習優先。' },
];

// 週ごとの詳細計画テンプレ
function getWeekPlan(weekNum, totalWeeks, phase, examDate) {
  const p = phase.id;
  const plans = {
    1: [ // 全体把握
      { title: '試験の全体像を把握する', tasks: ['試験の出題分野・問題数・合格基準を確認する', '8分野の解説ページをざっと読む（空調設備・給排水衛生設備から）', '演習問題を各分野10問ずつ解いて傾向をつかむ'], hours: 5, bunya: [0,1] },
      { title: '設備系2分野を重点的に確認', tasks: ['消防設備・工程管理の解説ページを読む', 'スプリンクラーの種類・クリティカルパスの定義を整理する', '各分野10問ずつ演習し、正答率を記録する'], hours: 6, bunya: [2,3] },
      { title: '管理系・法規の概要を把握', tasks: ['品質・安全管理・法規・一般基礎の解説ページを読む', '管理図・QC七つ道具の種類を整理する', '重要法規（建設業法・水道法）の骨子を確認'], hours: 5, bunya: [4,5,6] },
    ],
    2: [ // 重点分野集中
      { title: '空調設備を徹底演習', tasks: ['空調設備の演習問題を全問解く', '間違えた問題を解説で確認し、ノートにまとめる', '冷凍機・VAV・湿り空気の頻出ひっかけを整理'], hours: 7, bunya: [0] },
      { title: '給排水衛生設備を徹底演習', tasks: ['給排水衛生設備の演習問題を全問解く', 'トラップ封水破壊・クロスコネクション・レジオネラ菌対策を整理', 'ガス設備（都市ガスvs LPG）の比較表を作る'], hours: 7, bunya: [1] },
      { title: '法規を重点対策', tasks: ['法規の演習問題を全問解く', '建設業法・水道法・廃棄物処理法の重要規定を整理', '数値を伴う基準（簡易専用水道10m³・清掃年1回など）を暗記'], hours: 6, bunya: [5] },
      { title: '空調・給排水を再演習', tasks: ['ブックマークした苦手問題を中心に再挑戦', 'ひっかけパターン（「〜以上」「〜以下」「〜程度」など）を意識する', '正答率80%以上を目標に'], hours: 7, bunya: [0,1] },
      { title: '工程管理を重点演習', tasks: ['クリティカルパスの計算問題を繰り返し練習', 'フロート（TF・FF）の定義と計算を確実に理解する', 'バーチャートとネットワーク工程表の違いを整理'], hours: 6, bunya: [3] },
    ],
    3: [ // 全分野仕上げ
      { title: '全分野の演習を回す', tasks: ['全8分野の演習問題を1周解く（1日1〜2分野のペース）', '正答率の低い分野を特定して次週の集中分野を決める', '週末に全問通し演習（時間を計って本番の雰囲気で）'], hours: 8, bunya: [0,1,2,3,4,5,6] },
      { title: '苦手分野の集中対策', tasks: ['前週で正答率の低かった分野を重点的に演習', '間違いの多いパターンを分析し、根本的な理解を深める', '解説を読んで「なぜ誤りか」を自分の言葉で説明できるようにする'], hours: 7, bunya: [0,1,2,3,4,5,6] },
      { title: '消防設備・安全管理を仕上げる', tasks: ['消防設備の演習問題を全問解く（スプリンクラー方式の区別に注意）', '品質・安全管理の演習でQC七つ道具を完全に区別できるようにする', '酸素欠乏の定義（18%未満）・誘導灯点灯時間（20分）などの数値を確認'], hours: 7, bunya: [2,4] },
    ],
    4: [ // 直前対策
      { title: 'ひっかけポイントを総点検', tasks: ['各分野のひっかけパターンをまとめて確認（解説ページのmemo-box）', '数値が絡む問題（〇〇mm以上・〇〇回以上・〇〇m³超など）を集中確認', '試験本番と同じ時間配分で全問演習を実施'], hours: 8, bunya: [0,1,2,3,4,5,6] },
      { title: '法規・数値基準の最終確認', tasks: ['建設業法・水道法・廃棄物処理法の重要条文を読み返す', '労働安全衛生法の数値基準（高さ2m・5m・50人以上など）を確認', '前日は軽めに復習し、体調を整える'], hours: 5, bunya: [5] },
    ],
  };

  const phaseItems = plans[p];
  const idx = (weekNum - 1) % phaseItems.length;
  const plan = phaseItems[idx % phaseItems.length];
  return plan;
}

// ── ロードマップ生成 ──
function generateRoadmap() {
  const input = document.getElementById('examDate').value;
  if (!input) { alert('試験日を入力してください'); return; }

  const examDate = new Date(input + 'T00:00:00');
  const today = new Date();
  today.setHours(0,0,0,0);

  const diffMs = examDate - today;
  const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

  if (diffDays < 7) {
    alert('試験日は1週間以上先の日付を入力してください');
    return;
  }

  const totalWeeks = Math.min(Math.ceil(diffDays / 7), 24); // 最大24週
  const totalHours = Math.round(totalWeeks * 6.5);

  // Status
  document.getElementById('daysLeft').textContent = diffDays;
  document.getElementById('weeksLeft').textContent = totalWeeks;
  document.getElementById('totalHours').textContent = totalHours;
  document.getElementById('statusBar').style.display = 'block';

  // Phase strip
  const phaseStrip = document.getElementById('phaseStrip');
  phaseStrip.innerHTML = '';
  let phaseWeekStart = 1;
  PHASES.forEach(ph => {
    const phWeeks = Math.max(1, Math.round(totalWeeks * ph.ratio));
    const el = document.createElement('div');
    el.className = `phase-block ${ph.color}`;
    el.innerHTML = `${ph.name}<div class="phase-block-weeks">第${phaseWeekStart}〜${phaseWeekStart + phWeeks - 1}週</div>`;
    phaseStrip.appendChild(el);
    phaseWeekStart += phWeeks;
  });
  document.getElementById('phaseOverview').style.display = 'block';

  // Week cards
  const container = document.getElementById('weekCards');
  container.innerHTML = '';

  let currentPhaseIdx = 0;
  let phaseWeekCount = Math.max(1, Math.round(totalWeeks * PHASES[0].ratio));
  let phaseWeekUsed = 0;

  for (let w = 1; w <= totalWeeks; w++) {
    // フェーズ切り替え
    if (phaseWeekUsed >= phaseWeekCount && currentPhaseIdx < PHASES.length - 1) {
      currentPhaseIdx++;
      phaseWeekCount = Math.max(1, Math.round(totalWeeks * PHASES[currentPhaseIdx].ratio));
      phaseWeekUsed = 0;
    }
    phaseWeekUsed++;

    const phase = PHASES[currentPhaseIdx];
    const weekStart = new Date(today);
    weekStart.setDate(today.getDate() + (w - 1) * 7);
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 6);

    const isCurrentWeek = w === 1;
    const plan = getWeekPlan(phaseWeekUsed, totalWeeks, phase, examDate);

    const dateStr = `${weekStart.getMonth()+1}/${weekStart.getDate()} 〜 ${weekEnd.getMonth()+1}/${weekEnd.getDate()}`;

    const card = document.createElement('div');
    card.className = `week-card phase-${phase.id}${isCurrentWeek ? ' current-week open' : ''}`;

    const budoChips = plan.bunya.map(i =>
      `<a class="bunya-chip" href="${BUNYA[i].url}">${BUNYA[i].name}</a>`
    ).join('');

    const barWidth = Math.min(100, Math.round((plan.hours / 10) * 100));

    card.innerHTML = `
      <div class="week-header" onclick="toggleCard(this)">
        <div class="week-num">WEEK ${String(w).padStart(2,'0')}</div>
        <div class="week-title">${plan.title}</div>
        <div class="week-date">${dateStr}</div>
        <span class="week-tag ${phase.tag}">${phase.name}</span>
        ${isCurrentWeek ? '<span class="week-tag tag-today">今週</span>' : ''}
        <span class="chevron">▼</span>
      </div>
      <div class="week-body">
        <div class="week-desc">${phase.desc}</div>
        <ul class="task-list">
          ${plan.tasks.map(t => `<li class="task-item">${t}</li>`).join('')}
        </ul>
        <div class="bunya-chips">${budoChips}</div>
        <div class="study-hours">
          <span>目標学習時間</span>
          <div class="study-hours-bar"><div class="study-hours-fill" style="width:${barWidth}%"></div></div>
          <span style="font-family:var(--mono);color:var(--accent);font-weight:700;">${plan.hours}h</span>
        </div>
      </div>
    `;
    container.appendChild(card);
  }

  document.getElementById('roadmapSection').style.display = 'block';

  // スクロール
  setTimeout(() => {
    document.getElementById('statusBar').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

function toggleCard(header) {
  const card = header.closest('.week-card');
  card.classList.toggle('open');
}

// ── クイックボタン（試験日候補）──
function initQuickDates() {
  const today = new Date();
  const candidates = [];

  // 来年・再来年の6月第2日曜あたりを自動生成
  for (let y = today.getFullYear(); y <= today.getFullYear() + 2; y++) {
    // 6月の第2日曜日に近いあたり（試験は例年6月）
    const june = new Date(y, 5, 1);
    // 第2日曜
    const dow = june.getDay();
    const firstSun = dow === 0 ? june : new Date(y, 5, 7 - dow + 1);
    const secondSun = new Date(firstSun);
    secondSun.setDate(firstSun.getDate() + 7);
    if (secondSun > today) {
      candidates.push({ label: `${y}年6月（目安）`, date: secondSun });
    }
  }

  const container = document.getElementById('quickDates');
  candidates.slice(0, 3).forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.textContent = c.label;
    btn.onclick = () => {
      const d = c.date;
      const str = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      document.getElementById('examDate').value = str;
      generateRoadmap();
    };
    container.appendChild(btn);
  });
}

// ── Enter キー対応 ──
document.addEventListener('DOMContentLoaded', () => {
  initQuickDates();
  document.getElementById('examDate').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateRoadmap();
  });
});
</script>
