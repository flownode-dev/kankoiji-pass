<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#222636;--border:#2e3348;
  --accent:#4f8ef7;--accent2:#7c5cfc;--correct:#22c55e;--warn:#f59e0b;
  --text:#e8eaf0;--muted:#7a8099;--danger:#ef4444;--ink:#08090d;
  --r07:#e879f9; /* 令和7年度カラー：マゼンタ */
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;line-height:1.7;overflow-x:hidden;}
a{color:inherit;text-decoration:none;}

/* ヘッダー */
.site-header{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(15,17,23,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;z-index:1000;}
.logo{font-weight:900;font-size:1.1rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:7px;font-size:.78rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}

/* ヒーロー */
.hero{margin-top:56px;padding:3rem 1.5rem 2rem;background:linear-gradient(160deg,#08090e 0%,#13062e 50%,#08090e 100%);position:relative;overflow:hidden;text-align:center;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(232,121,249,.08) 0%,transparent 65%);}
.hero-year{display:inline-block;background:rgba(232,121,249,.15);border:1px solid rgba(232,121,249,.35);color:var(--r07);font-family:'Oswald',sans-serif;font-size:.78rem;letter-spacing:.25em;padding:.3rem 1.2rem;border-radius:99px;margin-bottom:1rem;position:relative;}
.hero-title{font-family:'Black Han Sans',sans-serif;font-size:clamp(1.6rem,5vw,2.8rem);color:#fff;line-height:1.05;position:relative;text-shadow:0 0 60px rgba(232,121,249,.2);}
.hero-title span{color:var(--r07);}
.hero-meta{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:1.2rem;position:relative;}
.hero-badge{background:var(--surface);border:1px solid var(--border);padding:.3rem .9rem;border-radius:6px;font-size:.78rem;color:var(--muted);}
.hero-badge strong{color:var(--text);}

/* タブ */
.tab-wrap{max-width:960px;margin:0 auto;padding:1.5rem 1rem 0;}
.tabs{display:flex;gap:6px;border-bottom:2px solid var(--border);padding-bottom:-2px;}
.tab{padding:.6rem 1.4rem;font-size:.85rem;font-weight:700;color:var(--muted);cursor:pointer;border-radius:8px 8px 0 0;border:1px solid transparent;border-bottom:none;transition:all .2s;background:none;font-family:'Noto Sans JP',sans-serif;}
.tab.active{color:var(--r07);border-color:var(--border);border-bottom-color:var(--bg);background:var(--surface);margin-bottom:-2px;}
.tab:hover:not(.active){color:var(--text);}

/* フィルター */
.filter-bar{max-width:960px;margin:0 auto;padding:.8rem 1rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
.filter-btn{padding:.3rem .8rem;border-radius:99px;font-size:.72rem;font-weight:700;border:1px solid var(--border);color:var(--muted);background:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
.filter-btn.active{background:var(--r07);color:#1a0030;border-color:var(--r07);}
.filter-btn:hover:not(.active){border-color:var(--r07);color:var(--r07);}
.filter-label{font-size:.72rem;color:var(--muted);font-weight:700;}

/* 進捗バー */
.progress-wrap{max-width:960px;margin:0 auto;padding:.5rem 1rem;}
.progress-bar-track{background:var(--surface2);border-radius:99px;height:6px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--r07),var(--accent2));border-radius:99px;transition:width .4s ease;}
.progress-text{font-size:.72rem;color:var(--muted);text-align:right;margin-top:.3rem;}

/* 問題カード */
.questions-wrap{max-width:960px;margin:0 auto;padding:1rem 1rem 6rem;}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:1rem;overflow:hidden;transition:border-color .2s;}
.q-card.correct{border-color:var(--correct);}
.q-card.wrong{border-color:var(--danger);}
.q-header{display:flex;align-items:center;gap:.6rem;padding:.7rem 1rem;border-bottom:1px solid var(--border);background:var(--surface2);}
.q-num{font-family:'Oswald',sans-serif;font-size:.85rem;font-weight:700;color:var(--r07);min-width:40px;}
.q-cats{display:flex;gap:.4rem;flex-wrap:wrap;}
.q-cat{font-size:.65rem;padding:.15rem .55rem;border-radius:3px;background:rgba(232,121,249,.1);color:var(--r07);border:1px solid rgba(232,121,249,.25);font-weight:700;}
.q-type-badge{margin-left:auto;font-size:.62rem;padding:.15rem .55rem;border-radius:3px;font-weight:700;}
.q-type-badge.single{background:rgba(79,142,247,.1);color:var(--accent);border:1px solid rgba(79,142,247,.25);}
.q-type-badge.multi{background:rgba(245,158,11,.1);color:var(--warn);border:1px solid rgba(245,158,11,.25);}
.q-status{font-size:.8rem;margin-left:.3rem;}
.q-body{padding:1rem;}
.q-text{font-size:.88rem;line-height:1.75;color:#d0d8f0;margin-bottom:1rem;}
.q-multi-notice{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:6px;padding:.5rem .8rem;font-size:.75rem;color:var(--warn);margin-bottom:.8rem;font-weight:700;}

/* 選択肢 */
.choices{display:flex;flex-direction:column;gap:.5rem;}
.choice{display:flex;align-items:flex-start;gap:.7rem;padding:.65rem .9rem;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;transition:all .15s;font-size:.84rem;line-height:1.6;color:#c8d0e8;background:var(--surface2);}
.choice:hover:not(.disabled){border-color:var(--r07);background:rgba(232,121,249,.06);}
.choice.selected{border-color:var(--accent);background:rgba(79,142,247,.08);color:#fff;}
.choice.selected-correct{border-color:var(--correct);background:rgba(34,197,94,.08);color:#fff;}
.choice.selected-wrong{border-color:var(--danger);background:rgba(239,68,68,.08);color:#fff;}
.choice.answer-highlight{border-color:var(--correct);background:rgba(34,197,94,.06);}
.choice.disabled{cursor:default;}
.choice-num{font-family:'Oswald',sans-serif;font-size:.85rem;font-weight:700;min-width:20px;color:var(--muted);flex-shrink:0;margin-top:.1rem;}
.choice.selected .choice-num,.choice.selected-correct .choice-num{color:var(--accent);}
.choice.selected-wrong .choice-num{color:var(--danger);}
.choice.answer-highlight .choice-num{color:var(--correct);}

/* 複数正答のチェックボックス風 */
.multi-check{width:16px;height:16px;border:2px solid var(--border);border-radius:3px;flex-shrink:0;margin-top:.2rem;display:flex;align-items:center;justify-content:center;font-size:.7rem;transition:all .15s;}
.choice.selected .multi-check,.choice.selected-correct .multi-check{background:var(--accent);border-color:var(--accent);color:#fff;}
.choice.selected-wrong .multi-check{background:var(--danger);border-color:var(--danger);color:#fff;}
.choice.answer-highlight .multi-check{background:var(--correct);border-color:var(--correct);color:#fff;}

/* 解答・解説 */
.q-actions{display:flex;gap:.5rem;margin-top:.8rem;}
.btn-submit{background:var(--r07);color:#1a0030;border:none;padding:.5rem 1.2rem;border-radius:7px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:opacity .15s;}
.btn-submit:hover{opacity:.85;}
.btn-submit:disabled{background:var(--border);color:var(--muted);cursor:default;}
.btn-reset-q{background:none;border:1px solid var(--border);color:var(--muted);padding:.5rem 1rem;border-radius:7px;font-size:.78rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.btn-reset-q:hover{border-color:var(--muted);color:var(--text);}

.explanation{margin-top:.8rem;padding:.8rem 1rem;background:#07121f;border-left:3px solid var(--r07);border-radius:0 6px 6px 0;font-size:.82rem;line-height:1.75;color:#b0c0e0;display:none;}
.explanation.show{display:block;}
.explanation-head{font-weight:700;color:var(--r07);font-size:.72rem;letter-spacing:.1em;margin-bottom:.4rem;font-family:'Oswald',sans-serif;}
.correct-tag{display:inline-block;background:rgba(34,197,94,.15);color:var(--correct);border:1px solid rgba(34,197,94,.3);padding:.1rem .5rem;border-radius:3px;font-size:.7rem;font-weight:700;margin-bottom:.5rem;}
.wrong-tag{display:inline-block;background:rgba(239,68,68,.15);color:var(--danger);border:1px solid rgba(239,68,68,.3);padding:.1rem .5rem;border-radius:3px;font-size:.7rem;font-weight:700;margin-bottom:.5rem;}

/* スコア表示 */
.score-panel{max-width:960px;margin:0 auto 2rem;padding:0 1rem;}
.score-card{background:var(--surface);border:2px solid var(--r07);border-radius:12px;padding:1.5rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;}
.score-num{font-family:'Oswald',sans-serif;font-size:3rem;font-weight:700;color:var(--r07);line-height:1;}
.score-label{font-size:.72rem;color:var(--muted);margin-top:.2rem;}
.score-detail{flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.5rem;}
.score-item{background:var(--surface2);border-radius:6px;padding:.5rem .7rem;text-align:center;}
.score-item-num{font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700;}
.score-item-num.g{color:var(--correct);}
.score-item-num.r{color:var(--danger);}
.score-item-num.y{color:var(--warn);}
.score-item-label{font-size:.65rem;color:var(--muted);margin-top:.1rem;}
.btn-reset-all{background:none;border:1px solid var(--border);color:var(--muted);padding:.5rem 1rem;border-radius:7px;font-size:.8rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-top:.5rem;}
.btn-reset-all:hover{border-color:var(--danger);color:var(--danger);}

/* フッター */
footer{background:var(--surface);border-top:1px solid var(--border);padding:1.5rem;text-align:center;font-size:.78rem;color:var(--muted);}
footer a:hover{color:var(--text);}

@media(max-width:600px){
  .q-header{flex-wrap:wrap;}
  .q-type-badge{margin-left:0;}
  .score-card{flex-direction:column;text-align:center;}
}
</style>

</div>

  <span class="filter-label">絞り込み：</span>
  <button class="filter-btn active" data-cat="all" onclick="setFilter('all')">すべて</button>
  <button class="filter-btn" data-cat="未回答" onclick="setFilter('未回答')">未回答</button>
  <button class="filter-btn" data-cat="正解" onclick="setFilter('正解')">正解</button>
  <button class="filter-btn" data-cat="不正解" onclick="setFilter('不正解')">不正解</button>

<div class="progress-wrap">
  <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">0 / 0 問回答済み</div>
</div>

<div class="score-panel" id="scorePanel" style="display:none;">
  <div class="score-card">
    <div>
      <div class="score-num" id="scorePct">0%</div>
      <div class="score-label">正答率</div>
    </div>
    <div class="score-detail">
      <div class="score-item"><div class="score-item-num g" id="scoreCorrect">0</div><div class="score-item-label">正解</div></div>
      <div class="score-item"><div class="score-item-num r" id="scoreWrong">0</div><div class="score-item-label">不正解</div></div>
      <div class="score-item"><div class="score-item-num y" id="scoreUnanswered">0</div><div class="score-item-label">未回答</div></div>
    </div>

</footer>

<script>
// ===== データ =====
const DATA_A_URL = '/data/r07a.json';
const DATA_B_URL = '/data/r07b.json';

let questionsA = [], questionsB = [], allQ = [];
let currentTab = 'A';
let currentFilter = 'all';
// state: { qId: { userAnswer: int|int[], result: 'correct'|'wrong'|null } }
let state = JSON.parse(localStorage.getItem('r07_state') || '{}');

// ===== ロード =====
async function loadData() {
  try {
    const [ra, rb] = await Promise.all([
      fetch(DATA_A_URL).then(r => r.json()),
      fetch(DATA_B_URL).then(r => r.json())
    ]);
    questionsA = ra;
    questionsB = rb;
    allQ = [...ra, ...rb];
    render();
  } catch(e) {
    document.getElementById('questionsWrap').innerHTML =
      '<div style="text-align:center;padding:3rem;color:var(--muted);">データの読み込みに失敗しました。<br>JSONファイルが /data/ に設置されているか確認してください。</div>';
  }
}

// ===== タブ切替 =====
function switchTab(tab) {
  currentTab = tab;
  currentFilter = 'all';
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['A','B','all'][i] === tab);
  });
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === 'all'));
  render();
}

function currentQuestions() {
  if(currentTab === 'A') return questionsA;
  if(currentTab === 'B') return questionsB;
  return allQ;
}

// ===== フィルター =====
function setFilter(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  render();
}

function filteredQuestions() {
  const qs = currentQuestions();
  if(currentFilter === 'all') return qs;
  return qs.filter(q => {
    const s = state[q.id];
    if(currentFilter === '未回答') return !s || !s.result;
    if(currentFilter === '正解') return s && s.result === 'correct';
    if(currentFilter === '不正解') return s && s.result === 'wrong';
    return true;
  });
}

// ===== 進捗・スコア =====
function updateProgress() {
  const qs = currentQuestions();
  const answered = qs.filter(q => state[q.id]?.result).length;
  const total = qs.length;
  const pct = total ? Math.round(answered / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${answered} / ${total} 問回答済み`;

  const correct = qs.filter(q => state[q.id]?.result === 'correct').length;
  const wrong = qs.filter(q => state[q.id]?.result === 'wrong').length;
  const unanswered = total - answered;
  const scorePct = answered ? Math.round(correct / answered * 100) : 0;

  if(answered > 0) {
    document.getElementById('scorePanel').style.display = 'block';
    document.getElementById('scorePct').textContent = scorePct + '%';
    document.getElementById('scoreCorrect').textContent = correct;
    document.getElementById('scoreWrong').textContent = wrong;
    document.getElementById('scoreUnanswered').textContent = unanswered;
  } else {
    document.getElementById('scorePanel').style.display = 'none';
  }
}

// ===== 描画 =====
function render() {
  const qs = filteredQuestions();
  const wrap = document.getElementById('questionsWrap');
  if(!qs.length) {
    wrap.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--muted);">該当する問題はありません。</div>';
    updateProgress();
    return;
  }
  wrap.innerHTML = qs.map((q, idx) => buildCard(q, idx)).join('');
  updateProgress();
}

function buildCard(q, idx) {
  const isMulti = Array.isArray(q.answer);
  const s = state[q.id] || {};
  const answered = !!s.result;
  const correct = s.result === 'correct';

  const qNum = q.id.includes('r07a') ? 'A-' + q.id.split('-')[1].replace(/^0+/,'') : 'B-' + q.id.split('-')[1].replace(/^0+/,'');
  const statusIcon = !s.result ? '' : (correct ? '✅' : '❌');
  const cardClass = !s.result ? '' : (correct ? 'correct' : 'wrong');

  const choices = q.choices.map((c, i) => buildChoice(q, i, c, s, answered, isMulti)).join('');

  const multiNotice = isMulti
    ? `<div class="q-multi-notice">⚠ この問題は<strong>適当でないものが2つ</strong>あります。2つとも選択して解答してください。</div>`
    : '';

  const submitDisabled = answered ? 'disabled' : '';
  const expl = answered ? `
    <div class="explanation show">
      <div class="explanation-head">📖 EXPLANATION</div>
      ${correct ? '<span class="correct-tag">✅ 正解！</span>' : '<span class="wrong-tag">❌ 不正解</span>'}
      <div>${escHtml(q.explanation)}</div>
    </div>` : `<div class="explanation" id="expl-${q.id}"></div>`;

  return `
<div class="q-card ${cardClass}" id="card-${q.id}">
  <div class="q-header">
    <div class="q-num">${escHtml(qNum)}</div>
    <div class="q-cats"><span class="q-cat">${escHtml(q.category)}</span><span class="q-cat">${q.year}年</span></div>
    <span class="q-type-badge ${isMulti ? 'multi' : 'single'}">${isMulti ? '2択' : '1択'}</span>
    <span class="q-status">${statusIcon}</span>
  </div>
  <div class="q-body">
    <div class="q-text">${escHtml(q.question)}</div>
    ${multiNotice}
    <div class="choices" id="choices-${q.id}">${choices}</div>
    <div class="q-actions">
      <button class="btn-submit" id="submit-${q.id}" onclick="submitAnswer('${q.id}')" ${submitDisabled}>解答する</button>
      ${answered ? `<button class="btn-reset-q" onclick="resetQ('${q.id}')">リセット</button>` : ''}
    </div>
    ${expl}
  </div>
</div>`;
}

function buildChoice(q, i, c, s, answered, isMulti) {
  const userAns = s.userAnswer;
  const correctAns = q.answer;

  let cls = 'choice';
  if(answered) cls += ' disabled';

  const icon = isMulti ? '<span class="multi-check"></span>' : '';
  const numLabel = ['①','②','③','④'][i] || (i+1)+'';

  if(answered) {
    if(isMulti) {
      const userArr = Array.isArray(userAns) ? userAns : [];
      const correctArr = Array.isArray(correctAns) ? correctAns : [];
      const userPicked = userArr.includes(i);
      const isCorrectChoice = correctArr.includes(i);
      if(userPicked && isCorrectChoice) cls += ' selected-correct';
      else if(userPicked && !isCorrectChoice) cls += ' selected-wrong';
      else if(!userPicked && isCorrectChoice) cls += ' answer-highlight';
    } else {
      const isPicked = userAns === i;
      const isCorrectChoice = correctAns === i;
      if(isPicked && isCorrectChoice) cls += ' selected-correct';
      else if(isPicked && !isCorrectChoice) cls += ' selected-wrong';
      else if(!isPicked && isCorrectChoice) cls += ' answer-highlight';
    }
    const checkMark = cls.includes('selected-correct') ? '✓' : cls.includes('selected-wrong') ? '✗' : cls.includes('answer-highlight') ? '✓' : '';
    const checkEl = isMulti
      ? `<span class="multi-check">${checkMark}</span>`
      : '';
    return `<div class="${cls}">${checkEl}<span class="choice-num">${numLabel}</span><span>${escHtml(c)}</span></div>`;
  }

  // 未回答時
  const onclick = isMulti
    ? `onclick="toggleMulti('${q.id}',${i})"`
    : `onclick="selectSingle('${q.id}',${i})"`;
  return `<div class="${cls}" id="c-${q.id}-${i}" ${onclick}>${icon}<span class="choice-num">${numLabel}</span><span>${escHtml(c)}</span></div>`;
}

// ===== 選択操作 =====
// 1択
function selectSingle(qId, idx) {
  const q = findQ(qId);
  if(!q || state[qId]?.result) return;
  if(!state[qId]) state[qId] = {};
  state[qId].userAnswer = idx;
  // UI更新
  document.querySelectorAll(`#choices-${qId} .choice`).forEach((el, i) => {
    el.classList.toggle('selected', i === idx);
  });
}

// 2択
function toggleMulti(qId, idx) {
  const q = findQ(qId);
  if(!q || state[qId]?.result) return;
  if(!state[qId]) state[qId] = {};
  if(!Array.isArray(state[qId].userAnswer)) state[qId].userAnswer = [];

  const arr = state[qId].userAnswer;
  const pos = arr.indexOf(idx);
  if(pos >= 0) {
    arr.splice(pos, 1);
  } else if(arr.length < 2) {
    arr.push(idx);
  }
  // UI更新
  document.querySelectorAll(`#choices-${qId} .choice`).forEach((el, i) => {
    el.classList.toggle('selected', arr.includes(i));
    const check = el.querySelector('.multi-check');
    if(check) check.textContent = arr.includes(i) ? '✓' : '';
  });
}

// ===== 解答判定 =====
function submitAnswer(qId) {
  const q = findQ(qId);
  if(!q) return;
  const s = state[qId] || {};
  const userAns = s.userAnswer;

  // 未選択チェック
  const isMulti = Array.isArray(q.answer);
  if(isMulti) {
    if(!Array.isArray(userAns) || userAns.length < 2) {
      alert('2つの選択肢を選んでください。');
      return;
    }
  } else {
    if(userAns === undefined || userAns === null) {
      alert('選択肢を選んでください。');
      return;
    }
  }

  // 正誤判定
  let correct;
  if(isMulti) {
    const ua = [...userAns].sort();
    const ca = [...q.answer].sort();
    correct = JSON.stringify(ua) === JSON.stringify(ca);
  } else {
    correct = userAns === q.answer;
  }
  state[qId].result = correct ? 'correct' : 'wrong';
  saveState();

  // カード再描画
  const card = document.getElementById('card-' + qId);
  if(card) {
    const qs = filteredQuestions();
    const idx = qs.findIndex(x => x.id === qId);
    card.outerHTML = buildCard(q, idx);
  }
  updateProgress();
}

// ===== リセット =====
function resetQ(qId) {
  delete state[qId];
  saveState();
  const q = findQ(qId);
  if(q) {
    const qs = filteredQuestions();
    const idx = qs.findIndex(x => x.id === qId);
    const card = document.getElementById('card-' + qId);
    if(card) card.outerHTML = buildCard(q, idx);
  }
  updateProgress();
}

function resetAll() {
  if(!confirm('現在の問題の回答をすべてリセットしますか？')) return;
  const qs = currentQuestions();
  qs.forEach(q => delete state[q.id]);
  saveState();
  render();
}

// ===== ユーティリティ =====
function findQ(qId) {
  return allQ.find(q => q.id === qId);
}
function saveState() {
  localStorage.setItem('r07_state', JSON.stringify(state));
}
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ===== 起動 =====
loadData();
</script>
